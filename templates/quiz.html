<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: {{ topic }} — AI Pedagogy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .quiz-container {
            max-width: 900px;
            margin: 2rem auto;
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .question-block {
            margin-bottom: 2.5rem;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .question-block:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .selection-card {
            padding: 1.25rem 1.75rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            cursor: pointer;
            border-radius: 16px;
            border: 1.5px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s ease;
        }

        .selection-card:hover {
            background: rgba(0, 212, 255, 0.08);
            border-color: var(--accent);
        }

        .selection-card.selected {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .feedback-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.6;
            display: none;
        }

        .feedback-correct {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--success);
            color: #10b981;
        }

        .feedback-incorrect {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: #ef4444;
        }

        .btn-submit {
            width: 100%;
            padding: 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), #4facfe);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .quiz-footer {
            display: none;
            margin-top: 3rem;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .score-display {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 2rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <nav class="navbar">
        <a href="{{ url_for('home') }}" class="navbar-brand">🎓 AI Pedagogy</a>
        <div class="navbar-links">
            <a href="{{ url_for('lesson_display') }}" class="badge-pill" style="text-decoration: none;">← Back to
                Lesson</a>
            <span style="color:var(--text-secondary);font-size:.9rem;">👤 {{ current_user.username }}</span>
        </div>
    </nav>

    <div class="container fade-in">
        <div class="quiz-container">
            <header style="text-align: center; margin-bottom: 2rem;">
                <h2
                    style="font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--accent), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    🧠 Quick Quiz</h2>
                <div id="quiz-status" style="color: var(--text-secondary); margin-bottom: 1rem;">Mastering <strong>{{
                        topic }}</strong></div>
            </header>

            <!-- Top Score Dashboard -->
            <div id="top-score" class="score-display"></div>

            <div id="quiz-content">
                <div id="loading-state" style="text-align:center; padding: 2rem;">
                    <div class="spinner"></div>
                    <p id="loading-msg" style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 0;">AI is
                        crafting your questions...</p>
                </div>
                <div id="stream-preview"
                    style="display:none; margin: 1rem 0; font-family: monospace; font-size: 0.8rem; color: var(--accent); opacity: 0.4; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; white-space: pre-wrap;">
                </div>
                <form id="quiz-form" style="display: none;"></form>
            </div>

            <!-- Bottom Score Dashboard & Actions -->
            <div class="quiz-footer" id="quiz-footer-actions">
                <div id="bottom-score" class="score-display" style="width: 100%; display: block; margin-bottom: 0;">
                </div>
                <div style="display: flex; gap: 1.5rem; width: 100%; justify-content: center;">
                    <a href="{{ url_for('lesson_display') }}" class="btn btn-secondary" style="padding: 1rem 2rem;">📖
                        Review Lesson</a>
                    <a href="{{ url_for('home') }}" class="btn btn-primary" style="padding: 1rem 2rem;">🏠 Back to
                        Home</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log("Robust Quiz System v5.0 Loaded");
        let currentRawText = "";
        let generationStarted = false;
        let isGenerationDone = false;

        async function startQuizGeneration() {
            if (generationStarted) return;
            generationStarted = true;
            console.log("API CALL: /generate-quiz starting...");

            const form = document.getElementById('quiz-form');
            const loading = document.getElementById('loading-state');
            const preview = document.getElementById('stream-preview');

            try {
                const response = await fetch('/generate-quiz');
                if (!response.ok) throw new Error("Server error: " + response.status);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.delta) {
                                    currentRawText += data.delta;
                                    parseAndRenderQuiz(currentRawText);
                                }
                                if (data.done) {
                                    isGenerationDone = true;
                                    loading.style.display = 'none';
                                    form.style.display = 'block';
                                    parseAndRenderQuiz(currentRawText, true);
                                }
                                if (data.error) throw new Error(data.error);
                            } catch (e) { console.warn("Parse Error", e); }
                        }
                    }
                }

                if (!isGenerationDone) {
                    loading.style.display = 'none';
                    form.style.display = 'block';
                    parseAndRenderQuiz(currentRawText, true);
                }

            } catch (err) {
                console.error("Quiz Error:", err);
                loading.innerHTML = `<p style="color:var(--danger)">FAIL: ${err.message}</p><button onclick="location.reload()" class="btn btn-secondary mt-2">Retry</button>`;
            }
        }

        function parseAndRenderQuiz(text, isFinal = false) {
            const form = document.getElementById('quiz-form');
            const loading = document.getElementById('loading-state');

            // Robust regex for variations in formatting
            let rawBlocks = text.split(/(?=Q\d+:|### Q\d+|Q:|^[1-5]\.|\[Q\])/im).filter(p => p.trim().length > 15);
            let htmlContent = "";
            let parsedCount = 0;

            rawBlocks.forEach((block, idx) => {
                const qNum = idx + 1;
                const qMatch = block.match(/(?:Q\d+:|### Q\d+|Q:|^[1-5]\.|\[Q\])\s*([\s\S]*?)(?=\n\s*(?:A[:.)\-\]]|Option A|\[A\]))/im);
                const aMatch = block.match(/(?:A[:.)\-\]]|Option A|\[A\])\s*([\s\S]*?)(?=\n\s*(?:B[:.)\-\]]|Option B|\[B\])|Answer:|Correct:|$)/im);
                const bMatch = block.match(/(?:B[:.)\-\]]|Option B|\[B\])\s*([\s\S]*?)(?=\n\s*(?:C[:.)\-\]]|Option C|\[C\])|Answer:|Correct:|$)/im);
                const cMatch = block.match(/(?:C[:.)\-\]]|Option C|\[C\])\s*([\s\S]*?)(?=\n\s*(?:D[:.)\-\]]|Option D|\[D\])|Answer:|Correct:|$)/im);
                const dMatch = block.match(/(?:D[:.)\-\]]|Option D|\[D\])\s*([\s\S]*?)(?=\n\s*(?:Answer:|Correct:|Explanation:|$))/im);
                const ansMatch = block.match(/(?:Answer:|Correct:|Ans:)\s*[:\]]?\s*([A-D])/im);
                const expMatch = block.match(/(?:Explanation:|Exp:)\s*[:\]]?\s*([\s\S]*?)(?=\n\s*(?:Q\d+:|### Q\d+|Q:|^[1-5]\.)|$)/im);

                if (qMatch && aMatch && bMatch) {
                    parsedCount++;
                    const qText = qMatch[1].trim().replace(/\*\*/g, '');
                    const opts = {
                        'A': aMatch[1].trim().replace(/\*\*/g, ''),
                        'B': bMatch[1].trim().replace(/\*\*/g, ''),
                        'C': cMatch ? cMatch[1].trim().replace(/\*\*/g, '') : "",
                        'D': dMatch ? dMatch[1].trim().replace(/\*\*/g, '') : ""
                    };
                    const correctAns = ansMatch ? ansMatch[1].trim().toUpperCase() : "";
                    const explanation = expMatch ? expMatch[1].trim().replace(/\*\*/g, '') : "Based on your lesson.";

                    htmlContent += `
                        <div class="question-block">
                            <h3 style="margin-bottom: 2rem; color: var(--accent); font-size: 1.4rem;">${qNum}. ${qText}</h3>
                            <div class="options">
                                ${Object.keys(opts).map(key => opts[key] ? `
                                    <label class="selection-card" onclick="selectOption(this, ${qNum})">
                                        <input type="radio" name="q${qNum}" value="${key}" style="display:none;">
                                        <div style="font-weight:700; color:var(--accent); min-width:30px;">${key}</div>
                                        <div style="flex: 1; font-size: 1.1rem;">${opts[key]}</div>
                                    </label>
                                ` : '').join('')}
                            </div>
                            <div class="feedback-box" id="feedback-${qNum}" data-answer="${correctAns}" data-explanation="${explanation}"></div>
                        </div>
                    `;
                }
            });

            if (parsedCount > 0) {
                loading.style.display = 'none';
                form.style.display = 'block';

                // Final cleanup: ensure the very last explanation isn't a half-sentence
                if (isFinal) {
                    htmlContent = htmlContent.replace(/(Explanation:.*?)([.!?])\s*[^.!?]*?$/im, '$1$2');
                }

                form.innerHTML = htmlContent + (isFinal ? `<button type="button" class="btn-submit" id="submit-quiz-btn" onclick="checkAnswers()">✨ SUBMIT QUIZ</button>` : `<p style="text-align:center; opacity:0.6; font-style:italic;">Processing questions... (${parsedCount} ready)</p>`);
            }
        }

        function selectOption(el, qIdx) {
            el.parentElement.querySelectorAll('.selection-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        }

        function checkAnswers() {
            const blocks = document.querySelectorAll('.question-block');
            let score = 0;
            const total = blocks.length;

            blocks.forEach((block, idx) => {
                const qNum = idx + 1;
                const checked = block.querySelector(`input[name="q${qNum}"]:checked`);
                const feedback = block.querySelector('.feedback-box');
                const cards = block.querySelectorAll('.selection-card');
                const correct = feedback.getAttribute('data-answer');
                const explanation = feedback.getAttribute('data-explanation');

                feedback.style.display = 'block';
                let isCorrect = checked && checked.value.trim().toUpperCase() === correct.trim().toUpperCase();
                if (isCorrect) score++;

                feedback.className = `feedback-box ${isCorrect ? 'feedback-correct' : 'feedback-incorrect'}`;
                feedback.innerHTML = `<div style="font-weight:700;">${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</div><div>${explanation}</div>`;

                cards.forEach(card => {
                    const val = card.querySelector('input').value;
                    if (val === correct) card.style.borderColor = '#10b981';
                    else if (checked && val === checked.value && !isCorrect) card.style.borderColor = '#ef4444';
                    card.style.pointerEvents = 'none';
                });
            });

            const percentage = Math.round((score / total) * 100);
            const scoreHTML = `
                <h2 style="color:var(--accent); font-size: 2.5rem; margin:0;">Score: ${score} / ${total}</h2>
                <p style="margin:0.5rem 0 0; color: var(--text-secondary); font-size: 1.2rem;">${percentage}% Accuracy Reached</p>
                <div style="height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 1.5rem; overflow: hidden;">
                    <div style="width: ${percentage}%; height: 100%; background: var(--accent); transition: width 1s ease-out;"></div>
                </div>
            `;

            // Display in both places for maximum visibility
            const topScore = document.getElementById('top-score');
            const bottomScore = document.getElementById('bottom-score');

            topScore.innerHTML = scoreHTML;
            topScore.style.display = 'block';
            bottomScore.innerHTML = scoreHTML;
            bottomScore.style.display = 'block';

            const submitBtn = document.getElementById('submit-quiz-btn');
            submitBtn.textContent = `RETAKE QUIZ ↻`;
            submitBtn.onclick = () => location.reload();

            document.getElementById('quiz-footer-actions').style.display = 'flex';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            console.log("SCORING COMPLETE: ", score, "/", total);
        }

        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            startQuizGeneration();
        } else {
            window.addEventListener('DOMContentLoaded', startQuizGeneration);
        }
    </script>
</body>

</html>
